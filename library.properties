name=DIYables TFT SPI
version=1.0.1
author=DIYables.io
maintainer=DIYables.io (diyables.io@gmail.com)
sentence=Arduino library for SPI TFT LCD displays (ILI9341, ILI9488, ST7789) with optional XPT2046 / HR2046 / ADS7843 touch support.
paragraph=Works with both touch and non-touch versions of the same SPI TFT modules. Supports ILI9341 (240x320, 16-bit RGB565), ILI9488 (320x480, 18-bit RGB666), and ST7789 (240x320, 16-bit RGB565) displays over SPI. Includes built-in driver for XPT2046 / HR2046 / ADS7843 SPI touch controllers and 4-wire resistive touch panels - no separate touch library required. Use the display-only API for non-touch panels, or add initTouchSPI() to enable touch on modules that include a touch controller. Extends Adafruit GFX for full graphics support. Works with any Arduino-compatible board that has SPI.
category=Display
url=https://diyables.io/categories/tft-spi
architectures=*
depends=Adafruit GFX Library
